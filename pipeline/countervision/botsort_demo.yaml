# Ultralytics 🚀 AGPL-3.0 License — based on the default botsort.yaml.
# CounterVision overrides:
#   - track_buffer 30 → 60       keep IDs alive ~2.4s at 25fps so a person
#                                 sitting / briefly occluded keeps their ID.
#   - new_track_thresh 0.25 → 0.30  suppress a little low-conf flicker on
#                                 overhead / wide angles.
# Everything else matches the default so the tracker behaves the way the
# library expects. with_reid stays False — enabling it triggers a known
# regression in 8.4.x where the first track() call drops `source` and the
# appearance gate produces unstable IDs against a strict appearance_thresh.

tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.30
track_buffer: 60
match_thresh: 0.8
fuse_score: True

# BoT-SORT specifics
gmc_method: sparseOptFlow

# ReID model related thresh
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
model: auto
