store_name: CounterVision Demo Store
fps_fallback: 25
video_extensions: [.mp4, .mov]
processing_window: {start_seconds: 0, duration_seconds: 180}
detect:
  model: yolo26s.pt
  device: mps
  imgsz: 960
  conf: 0.3
  iou: 0.55
  classes: [0]
  tracker_yaml: countervision/botsort_demo.yaml
  trace_length: 90
  box_thickness: 2
  label_text_scale: 0.5
  id_switch_iou: 0.3
  id_switch_lookback_frames: 30
cameras:
  camera-1:
    area: Cosmetics & Skincare
    zones:
    - name: Main floor
      color: '#0A1347'
      polygon:
      - [384, 216]
      - [1536, 216]
      - [1536, 864]
      - [384, 864]
    entry_line:
      start: [288, 810]
      end: [1632, 810]
  camera-3:
    area: Customer Seating / Try-on Lounge
    zones:
    - name: Main floor
      color: '#0A1347'
      polygon:
      - [384, 216]
      - [1536, 216]
      - [1536, 864]
      - [384, 864]
    entry_line:
      start: [288, 810]
      end: [1632, 810]
  camera-5:
    area: Service & Consultation Desk
    zones:
    - name: Main floor
      color: '#0A1347'
      polygon:
      - [384, 216]
      - [1536, 216]
      - [1536, 864]
      - [384, 864]
    entry_line:
      start: [288, 810]
      end: [1632, 810]
identity:
  enabled: true
  quality_min: 0.55
  cosine_match: 0.32
  sample_every_n_frames: 5
behaviour: {loiter_seconds: 90}
